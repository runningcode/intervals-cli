name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./... -v
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
